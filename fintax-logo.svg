<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="640" height="200">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#112240;stop-opacity:1" />
    </linearGradient>

    <!-- Icon accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9A3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A8FF;stop-opacity:1" />
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CBD5E1;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00D9A3" flood-opacity="0.25"/>
    </filter>

    <!-- Icon clip -->
    <clipPath id="iconClip">
      <rect x="10" y="12" width="76" height="76" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background pill -->
  <rect width="320" height="100" rx="18" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture overlay -->
  <rect width="320" height="100" rx="18" fill="none" stroke="#1E3A5F" stroke-width="0.5" opacity="0.4"/>

  <!-- ── ICON BLOCK ── -->
  <!-- Icon background square -->
  <rect x="10" y="12" width="76" height="76" rx="16" fill="#0A2540"/>
  <rect x="10" y="12" width="76" height="76" rx="16" fill="none" stroke="url(#accentGrad)" stroke-width="1.2" opacity="0.7"/>

  <!-- Bar chart bars (rising) -->
  <rect x="22" y="58" width="10" height="18" rx="3" fill="url(#accentGrad)" opacity="0.5"/>
  <rect x="36" y="47" width="10" height="29" rx="3" fill="url(#accentGrad)" opacity="0.75"/>
  <rect x="50" y="34" width="10" height="42" rx="3" fill="url(#accentGrad)"/>

  <!-- Trend line over bars -->
  <polyline
    points="27,57 41,46 55,33"
    fill="none"
    stroke="#00D9A3"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
  <!-- Dot at tip of trend -->
  <circle cx="55" cy="33" r="3.5" fill="#00D9A3" filter="url(#glow)"/>

  <!-- Small "%" badge bottom-right of icon -->
  <rect x="58" y="66" width="22" height="16" rx="5" fill="#00A8FF" opacity="0.15"/>
  <text x="69" y="78" font-family="'Courier New', monospace" font-size="9" font-weight="700"
        fill="#00A8FF" text-anchor="middle" letter-spacing="0">%</text>

  <!-- ── TEXT BLOCK ── -->
  <!-- "Fin" part -->
  <text
    x="100"
    y="52"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="38"
    font-weight="700"
    fill="url(#textGrad)"
    letter-spacing="-1"
  >Fin</text>

  <!-- "Tax" part with accent color -->
  <text
    x="162"
    y="52"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="38"
    font-weight="700"
    fill="url(#accentGrad)"
    letter-spacing="-1"
    filter="url(#glow)"
  >Tax</text>

  <!-- Tagline -->
  <text
    x="101"
    y="70"
    font-family="'Courier New', monospace"
    font-size="9.5"
    font-weight="400"
    fill="#64748B"
    letter-spacing="3"
  >FINANCIAL ANALYTICS</text>

  <!-- Divider accent line under tagline -->
  <line x1="101" y1="76" x2="228" y2="76" stroke="url(#accentGrad)" stroke-width="1" opacity="0.4"/>

  <!-- AI badge top-right -->
  <rect x="265" y="18" width="42" height="18" rx="6" fill="none" stroke="url(#accentGrad)" stroke-width="1"/>
  <text x="286" y="30" font-family="'Courier New', monospace" font-size="9" font-weight="700"
        fill="url(#accentGrad)" text-anchor="middle" letter-spacing="1">AI</text>
</svg>
