<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A"/>
      <stop offset="50%" style="stop-color:#112240"/>
      <stop offset="100%" style="stop-color:#0D1B2A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9A3"/>
      <stop offset="100%" style="stop-color:#00A8FF"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#CBD5E1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#00D9A3" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Icon block (scaled up from logo) -->
  <g transform="translate(100, 160)">
    <rect x="0" y="0" width="130" height="130" rx="28" fill="#0A2540"/>
    <rect x="0" y="0" width="130" height="130" rx="28" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.7"/>
    <rect x="20" y="78" width="18" height="32" rx="5" fill="url(#accent)" opacity="0.5"/>
    <rect x="44" y="58" width="18" height="52" rx="5" fill="url(#accent)" opacity="0.75"/>
    <rect x="68" y="36" width="18" height="74" rx="5" fill="url(#accent)"/>
    <polyline points="29,76 53,56 77,34" fill="none" stroke="#00D9A3" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <circle cx="77" cy="34" r="6" fill="#00D9A3" filter="url(#glow)"/>
    <rect x="82" y="92" width="36" height="26" rx="8" fill="#00A8FF" opacity="0.15"/>
    <text x="100" y="111" font-family="monospace" font-size="15" font-weight="700" fill="#00A8FF" text-anchor="middle">%</text>
  </g>

  <!-- "Fin" text -->
  <text x="260" y="260" font-family="Georgia,serif" font-size="90" font-weight="700" fill="url(#textGrad)" letter-spacing="-2">Fin</text>
  <!-- "Tax" text -->
  <text x="415" y="260" font-family="Georgia,serif" font-size="90" font-weight="700" fill="url(#accent)" letter-spacing="-2" filter="url(#glow)">Tax</text>

  <!-- Tagline -->
  <text x="262" y="300" font-family="monospace" font-size="20" fill="#64748B" letter-spacing="5">FINANCIAL ANALYTICS</text>

  <!-- Divider -->
  <line x1="262" y1="315" x2="560" y2="315" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>

  <!-- Description -->
  <text x="100" y="400" font-family="system-ui,sans-serif" font-size="30" fill="#94a3b8">Phan tich hoa don &amp; thue thong minh</text>
  <text x="100" y="445" font-family="system-ui,sans-serif" font-size="22" fill="#64748b">AI Chat  ·  Dashboard  ·  Du bao tai chinh</text>

  <!-- AI badge -->
  <rect x="600" y="210" width="70" height="35" rx="10" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
  <text x="635" y="234" font-family="monospace" font-size="16" font-weight="700" fill="url(#accent)" text-anchor="middle" letter-spacing="2">AI</text>

  <!-- Decorative chart on right side -->
  <g transform="translate(780, 140)" opacity="0.12">
    <rect x="0" y="200" width="60" height="130" rx="10" fill="url(#accent)"/>
    <rect x="80" y="130" width="60" height="200" rx="10" fill="url(#accent)"/>
    <rect x="160" y="160" width="60" height="170" rx="10" fill="url(#accent)"/>
    <rect x="240" y="80" width="60" height="250" rx="10" fill="url(#accent)"/>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)"/>

  <!-- Domain -->
  <text x="100" y="580" font-family="monospace" font-size="22" font-weight="500" fill="#00D9A3">fintaxfree.me</text>
</svg>
